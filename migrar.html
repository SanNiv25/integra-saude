<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <title>Migrador: Firebase ➡️ Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #f4f9f9;
        }

        .caixa {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            margin: 0 auto;
        }

        textarea {
            width: 100%;
            height: 250px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #0F766E;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            width: 100%;
        }

        button:hover {
            background-color: #0d5f59;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="caixa">
        <h2 style="color: #0f4c5c;">🚀 Migrador de Pacientes (Modo Texto)</h2>
        <p style="color: #555;">Abra o seu arquivo <strong>.json</strong> do Firebase, copie TUDO o que está lá dentro e
            cole na caixa abaixo:</p>

        <textarea id="jsonTexto" placeholder="Cole o conteúdo do seu arquivo .json aqui..."></textarea>

        <button onclick="migrarDados()" id="btnMigrar">Iniciar Migração</button>
        <p id="status"></p>
    </div>

    <script>
        // Ligar ao seu Supabase
        const supabaseUrl = 'https://dpmfwcnkmfrplcyxufiz.supabase.co';
        const supabaseKey = 'sb_publishable_pXzz88b6J5LwsTJ40LTplg_6BBCUFAB';
        const clienteSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function migrarDados() {
            const textoConteudo = document.getElementById('jsonTexto').value.trim();
            const btn = document.getElementById('btnMigrar');
            const statusTxt = document.getElementById('status');

            if (!textoConteudo) {
                alert("⚠️ A caixa de texto está vazia. Cole o conteúdo do JSON primeiro.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "A processar dados...";
            statusTxt.style.color = "#e67e22";
            statusTxt.innerText = "A preparar o envio...";

            try {
                // Lê o texto que você colou
                const dadosRaw = JSON.parse(textoConteudo);

                // Descobrir onde estão os pacientes no JSON do Firebase
                let utilizadoresFirebase = [];
                if (dadosRaw.usuarios) {
                    utilizadoresFirebase = Array.isArray(dadosRaw.usuarios) ? dadosRaw.usuarios : Object.values(dadosRaw.usuarios);
                } else {
                    utilizadoresFirebase = Array.isArray(dadosRaw) ? dadosRaw : Object.values(dadosRaw);
                }

                // Limpa dados vazios
                utilizadoresFirebase = utilizadoresFirebase.filter(u => u != null && u.cpf);

                if (utilizadoresFirebase.length === 0) {
                    statusTxt.style.color = "#e74c3c";
                    statusTxt.innerText = "Nenhum paciente encontrado no texto colado.";
                    btn.disabled = false;
                    btn.innerText = "Tentar Novamente";
                    return;
                }

                statusTxt.innerText = `A enviar ${utilizadoresFirebase.length} pacientes para o Supabase...`;

                // Prepara os dados exatos para as colunas do Supabase
                const dadosLimpos = utilizadoresFirebase.map(u => ({
                    cpf: String(u.cpf || "").replace(/\D/g, ""),
                    nome: u.nome || "Paciente sem nome",
                    email: u.email || "",
                    senha: u.senha || "",
                    nascimento: u.nascimento || "",
                    fotoPerfil: u.fotoPerfil || "",
                    endereco: u.endereco || null
                }));

                // 🚀 Envia para a tabela do Supabase
                const { data, error } = await clienteSupabase
                    .from('usuarios')
                    .insert(dadosLimpos);

                if (error) {
                    console.error("Erro devolvido pelo Supabase:", error);
                    throw error;
                }

                statusTxt.style.color = "#2ecc71";
                statusTxt.innerText = "✅ Migração concluída com sucesso!";
                btn.innerText = "Pacientes Migrados!";

            } catch (erro) {
                console.error("Erro no Try-Catch:", erro);
                statusTxt.style.color = "#e74c3c";
                statusTxt.innerText = "❌ Ocorreu um erro. Verifique se copiou todo o conteúdo do JSON corretamente.";
                btn.disabled = false;
                btn.innerText = "Tentar Novamente";
            }
        }
    </script>
</body>

</html>
